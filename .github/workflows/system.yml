name: Live System Engine

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # -------------------------------
      # 📈 MARKET DATA
      # -------------------------------
      - name: Generate Market Data
        run: |
          echo "## 📈 Market Snapshot" > market.txt
          echo "" >> market.txt
          echo "\`\`\`" >> market.txt
          echo "NIFTY 50   → LIVE" >> market.txt
          echo "SENSEX     → LIVE" >> market.txt
          echo "BTC        → $$(shuf -i 60000-70000 -n 1)" >> market.txt
          echo "ETH        → $$(shuf -i 2500-3500 -n 1)" >> market.txt
          echo "\`\`\`" >> market.txt

      # -------------------------------
      # ⚡ SYSTEM STATUS
      # -------------------------------
      - name: Generate Status
        run: |
          echo "## ⚡ System Status" > status.txt
          echo "" >> status.txt
          echo "\`\`\`" >> status.txt
          echo "EcoInsight Status : ONLINE" >> status.txt
          echo "AI Engine         : ACTIVE" >> status.txt
          echo "Last Update       : $$(date)" >> status.txt
          echo "Build Mode        : Shipping Weekly" >> status.txt
          echo "\`\`\`" >> status.txt

      # -------------------------------
      # 🧠 SYSTEM LOGS
      # -------------------------------
      - name: Generate Logs
        run: |
          echo "## 🧠 System Logs" > logs.txt
          echo "" >> logs.txt
          echo "\`\`\`" >> logs.txt
          echo "[$$(date '+%Y-%m-%d')] System running smoothly" >> logs.txt
          echo "[$$(date '+%Y-%m-%d')] Updating AI models" >> logs.txt
          echo "[$$(date '+%Y-%m-%d')] Monitoring data pipelines" >> logs.txt
          echo "\`\`\`" >> logs.txt

      # -------------------------------
      # 🔁 INJECT INTO README
      # -------------------------------
      - name: Inject Sections
        run: |
          awk '/START_SECTION:market/{print;system("cat market.txt");next}/END_SECTION:market/{print;next}1' README.md > tmp && mv tmp README.md
          awk '/START_SECTION:status/{print;system("cat status.txt");next}/END_SECTION:status/{print;next}1' README.md > tmp && mv tmp README.md
          awk '/START_SECTION:logs/{print;system("cat logs.txt");next}/END_SECTION:logs/{print;next}1' README.md > tmp && mv tmp README.md

      # -------------------------------
      # 🚀 COMMIT CHANGES
      # -------------------------------
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "⚡ Auto-update live system" || exit 0
          git push
