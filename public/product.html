<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Premium Roasted Makhana | Veyano Foods</title>
  
  <script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_cG9ldGljLWJ1enphcmQtMjcuY2xlcmsuYWNjb3VudHMuZGV2JA" src="https://cdn.clerk.com/v1/clerk.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="navbar">
    <div class="container flex justify-between items-center">
      <a href="index.html" class="brand-logo">Veyano</a>
      <div class="nav-actions">
        <nav style="display: flex; align-items: center; gap: 1.5rem;">
          <a href="index.html#products" class="btn btn-outline">All Products</a>
        </nav>
        <div class="cart-icon" id="cart-icon-btn">
          <div style="position: relative;">
            <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2;"><path d="M9 20a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm7 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm1.75-2.25L19 7H5.21l-.94-2H1V3h3.27l4.42 9.39L7 15.12c0 .07 0 .13.01.2.06.82.74 1.43 1.56 1.43h10.18v-1.5H8.75c-.07 0-.13-.03-.16-.09l.03-.06 1.13-2.1h7.45c.56 0 1.06-.31 1.3-.78z"/></svg>
            <span class="cart-badge" id="cart-count">0</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 100px 0;">
    <section class="product-detail-section" style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
      <div class="product-gallery">
        <img id="main-product-image" src="./assets/plain.png" style="width: 100%; border-radius: 20px;">
      </div>
      <div class="product-meta">
        <h1 id="product-title">Classic Plain Makhana</h1>
        <div class="product-price" id="product-price" style="font-size: 2rem; margin: 1rem 0;">₹399</div>
        <div class="variant-selector" style="margin: 2rem 0;">
          <p style="margin-bottom: 1rem; color: #666;">Select Variant:</p>
          <button class="variant-btn active" data-variant="plain">Plain</button>
          <button class="variant-btn" data-variant="salted">Salted</button>
          <button class="variant-btn" data-variant="periperi">Peri-Peri</button>
          <button class="variant-btn" data-variant="combo">Combo</button>
        </div>
        <button class="btn" id="add-to-cart-btn" style="width: 100%;">Add to Cart</button>
      </div>
    </section>
  </main>

  <div class="cart-overlay" id="cart-overlay"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="close-cart" id="close-cart-btn">&times;</button>
    </div>
    <div class="user-profile-bar" id="user-profile-bar" style="display: none;">
      <div class="user-info">
        <span id="user-name-display">Logged In</span>
      </div>
      <button class="logout-link" id="logout-btn">Logout</button>
    </div>
    <div class="cart-body">
      <div id="clerk-auth-container" style="margin-bottom: 2rem;"></div>
      <div id="cart-step-items"><div id="cart-items-container"></div></div>
      <div id="cart-step-shipping" style="display: none;">
        <h4 style="margin-bottom: 1rem; color: #c08b5c;">Shipping</h4>
        <form id="checkout-form" class="checkout-form">
          <input type="text" id="ship-name" placeholder="Name" required style="width: 100%; margin-bottom: 1rem;">
          <input type="email" id="ship-email" placeholder="Email" required style="width: 100%; margin-bottom: 1rem;">
          <input type="tel" id="ship-phone" placeholder="Phone" required style="width: 100%; margin-bottom: 1rem;">
          <textarea id="ship-address" placeholder="Address" required style="width: 100%; margin-bottom: 1rem;"></textarea>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
             <input type="text" id="ship-city" placeholder="City" required>
             <input type="text" id="ship-pincode" placeholder="Pincode" required>
          </div>
          <select id="ship-state" required style="width: 100%; margin-top: 1rem;">
             <option value="Delhi">Delhi</option>
             <option value="Maharashtra">Maharashtra</option>
          </select>
          <div class="payment-methods" style="margin-top: 2rem;">
            <label><input type="radio" name="paymentMethod" value="cod" checked> Cash on Delivery</label>
          </div>
        </form>
      </div>
      <div id="cart-step-success" style="display: none; text-align: center; padding: 2rem 0;">
        <h3>Order Placed!</h3>
        <p id="order-number-display"></p>
        <button class="btn btn-outline" onclick="location.href='index.html'">Shop More</button>
      </div>
    </div>
    <div class="cart-footer">
      <div id="summary-section">
        <div class="cart-summary-row"><span>Total</span><span id="cart-total">₹0</span></div>
      </div>
      <button class="btn" id="next-step-btn" style="width: 100%;">Checkout</button>
      <div id="checkout-actions" style="display: none; gap: 10px;">
        <button class="btn btn-outline" id="back-to-cart-btn" style="flex:1;">Back</button>
        <button class="btn" id="place-order-btn" style="flex:2;">Order Now</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=2.0.0"></script>
</body>
</html>
